<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加入我们 - 郑策 - 华中科技大学人工智能与自动化学院</title>
  <!-- 替换[你的仓库名]：主仓库直接删除/[你的仓库名]，保留/assets/css/style.css -->
  <link rel="stylesheet" href="/cezheng-website/assets/css/style.css">
  <!-- 引入Font Awesome图标库（仅新增这一行） -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 加入我们页面专属样式（贴合原站+适配内容排版） */
    .join-section {
      margin-bottom: 35px;
      padding: 5px 0;
    }
    .join-section h3 {
      color: #003366; /* 与所有页面标题配色一致 */
      font-size: 19px;
      margin-bottom: 15px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
    }
    .join-section p {
      margin-bottom: 12px;
      font-size: 16px;
      line-height: 1.8;
      color: #333;
    }
    .join-section ul {
      list-style: disc;
      margin-left: 25px;
      margin-bottom: 15px;
    }
    .join-section li {
      margin-bottom: 10px;
      font-size: 16px;
      line-height: 1.7;
      color: #333;
    }
    /* 研究方向跳转按钮（贴合原站按钮风格） */
    .research-link {
      display: inline-block;
      background-color: #f0f0f0;
      border: 1px solid #ccc;
      color: #000;
      font-size: 14px;
      padding: 4px 12px;
      border-radius: 4px;
      text-decoration: none;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    .research-link:hover {
      background-color: #e6e6e6;
      text-decoration: none;
    }
    /* 引用链接样式 */
    .join-section a:not(.research-link) {
      color: #0066cc;
      text-decoration: underline;
    }
    .join-section a:not(.research-link):hover {
      text-decoration: none;
    }
    /* 带备注的文字样式：点状下划线+问号鼠标指针 */
    .join-section li span[title],
    .join-section span[title] {
      text-decoration: underline dotted #0066cc;
      cursor: help;
    }
    /* 仅新增：悬停引导图标样式 */
    .tooltip-icon {
      color: #0066cc;
      cursor: help;
      margin-left: 6px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏：与所有页面保持统一 -->

<div class="container" style="display: flex; max-width: 1600px; margin: 0 auto; padding: 40px 20px;">

</div>
